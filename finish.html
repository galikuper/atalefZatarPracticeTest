<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet" type="text/css" />
    <title>תרגול זט”ר עטלף</title>
</head>

<body dir="rtl">
    <img src="assets/peleIcon.svg" alt="פלא - פיתוח למידה אינטראקטיבית" id="pele-icon" />
    <div id="left-logos">
        <img src="assets/gapaIcon.svg" alt='גפ"ה - חטיבת ביסל"ח' id="gapa-icon" />
        <img src="assets/bislachIcon.svg" alt='ביסלמ"ח' id="bislach-icon" />
    </div>

    <div id="page-content">
        <div id="bat-container">
            <img src="assets/closingBat.svg" alt='תרגול זט"ר ציון' id="close-title" />
            <h1 id="score"></h1>
        </div>
        <div id="finish-text-container">
            <h2 class="finish-text" id="finish-name">name</h2>
            <h2 class="finish-text" id="finish-number">number</h2>
        </div>
        <img src="assets/restartBtn.svg" alt='להתחלה' id="restart-practice" />
        <p>הציון לא כולל את השאלות הפתוחות</p>
    </div>


    <div id="transition-overlay"></div>
    
    <script src="code.js"></script>
</body>

</html>

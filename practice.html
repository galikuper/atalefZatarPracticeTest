<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet" type="text/css" />
    <title>תרגול זט”ר עטלף</title>
</head>

<body dir="rtl">
    <img src="assets/peleIcon.svg" alt="פלא - פיתוח למידה אינטראקטיבית" id="pele-icon" />
    <div id="left-logos">
        <img src="assets/gapaIcon.svg" alt='גפ"ה - חטיבת ביסל"ח' id="gapa-icon" />
        <img src="assets/bislachIcon.svg" alt='ביסלמ"ח' id="bislach-icon" />
    </div>

    <div id="page-content">
        <form id='question' name=''>
            <!-- <img id="top" /> -->
            <div id="top"></div>
            <div id="header"></div>
            <div id="input-div"></div>

            <input type="image" id="form-btn" />
        </form>

        <div id="image-modal" class="hidden">
            <img id="modal-image" />
            <button id="close-modal">✕</button>
        </div>

        <img alt='progress bar' id="progress-bar" />
    </div>
    <script src="code.js"></script>
